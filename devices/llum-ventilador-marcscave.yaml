substitutions:
  device_name: "llum-ventilador-marcscave"
  device_id: "llum_ventilador_marcscave"
  friendly_name: "Llum Ventilador Marcscave"
  topic_prefix: "llum_ventilador_marcscave"

packages:

  shelly-25: !include ../hardware/shelly-25.yaml
  wifi: !include
    file: ../common/wifi.yaml
    vars:
      device_name: ${device_name}

  mqtt: !include
    file: ../common/mqtt.yaml
    vars:
      device_name: ${device_name}

  logger: !include ../common/logger.yaml
  web-server: !include ../common/web-server.yaml
  reset: !include ../common/reset.yaml
  time: !include ../common/time.yaml

# The hardware package interlocks the relays for shutter use; light and fan
# must be allowed on together.
switch:
  - id: !extend relay_a
    interlock: !remove
    interlock_wait_time: !remove
  - id: !extend relay_b
    interlock: !remove
    interlock_wait_time: !remove

binary_sensor:

  # Main button (Input A) with multi-click behavior for light/fan control
  - platform: template
    name: "${friendly_name} Main Button"
    id: "main_button"
    lambda: |-
      return id(input_a).state;
    filters:
      - delayed_on_off: 50ms
    on_multi_click:

      # Single click (short press) - toggle relay_a (light)
      - timing:
          - ON for at most 1s
        then:
          - logger.log: "${device_name} Button - Toggle Light"
          - switch.toggle: relay_a

      # Hold (long press) - toggle relay_b (fan), then off after 60 minutes
      - timing:
          - ON for at least 1s
        then:
          - logger.log: "${device_name} Button - Toggle Fan"
          - switch.toggle: relay_b
          - if:
              condition:
                switch.is_on: relay_b
              then:
                - delay: 60min
                - switch.turn_off: relay_b
    internal: true

  # Second button (Input B) - toggle relay_b (fan) directly
  - platform: template
    name: "${friendly_name} Fan Button"
    id: "fan_button"
    lambda: |-
      return id(input_b).state;
    filters:
      - delayed_on_off: 50ms
    on_press:
      then:
        - switch.toggle: relay_b
    internal: true
