substitutions:
  device_name: "llum-ventilador-marcscave"
  device_id: "llum_ventilador_marcscave"
  friendly_name: "Llum Ventilador Marcscave"
  topic_prefix: "llum_ventilador_marcscave"
  # Aqara WXKG11LM wireless button paired to the homelab z2m (baixos coordinator)
  aqara_button_topic: "zigbee2mqtt-baixos/boto-marcscave"

packages:

  shelly-25: !include ../hardware/shelly-25.yaml
  wifi: !include
    file: ../common/wifi.yaml
    vars:
      device_name: ${device_name}

  mqtt: !include
    file: ../common/mqtt.yaml
    vars:
      device_name: ${device_name}

  logger: !include ../common/logger.yaml
  web-server: !include ../common/web-server.yaml
  reset: !include ../common/reset.yaml
  time: !include ../common/time.yaml

# The hardware package interlocks the relays for shutter use; light and fan
# must be allowed on together.
switch:
  - id: !extend relay_a
    interlock: !remove
    interlock_wait_time: !remove
  - id: !extend relay_b
    interlock: !remove
    interlock_wait_time: !remove

# The Aqara button mirrors the physical main button:
# single click -> light, hold -> fan.
mqtt:
  on_message:
    - topic: "${aqara_button_topic}"
      qos: 1
      then:
        - lambda: |-
            StaticJsonDocument<512> doc;
            auto error = deserializeJson(doc, x);
            if (error) {
              ESP_LOGW("MQTT", "Failed to parse JSON: %s", error.c_str());
              return;
            }

            // Battery/linkquality-only updates carry no "action" key.
            if (!doc.containsKey("action")) return;
            const char *action = doc["action"].as<const char*>();
            if (action == nullptr) return;

            if (strcmp(action, "single") == 0) {
              ESP_LOGI("MQTT", "${device_name} Aqara button single - Toggle Light");
              id(toggle_light).execute();
            } else if (strcmp(action, "hold") == 0) {
              ESP_LOGI("MQTT", "${device_name} Aqara button hold - Toggle Fan");
              id(toggle_fan).execute();
            }

binary_sensor:

  # Main button (Input A) with multi-click behavior for light/fan control
  - platform: template
    name: "${friendly_name} Main Button"
    id: "main_button"
    lambda: |-
      return id(input_a).state;
    filters:
      - delayed_on_off: 50ms
    on_multi_click:

      # Single click (short press) - toggle relay_a (light)
      - timing:
          - ON for at most 1s
        then:
          - logger.log: "${device_name} Button - Toggle Light"
          - script.execute: toggle_light

      # Hold (long press) - toggle relay_b (fan), then off after 60 minutes
      - timing:
          - ON for at least 1s
        then:
          - logger.log: "${device_name} Button - Toggle Fan"
          - script.execute: toggle_fan
    internal: true

  # Second button (Input B) - toggle relay_b (fan) directly, no auto-off
  - platform: template
    name: "${friendly_name} Fan Button"
    id: "fan_button"
    lambda: |-
      return id(input_b).state;
    filters:
      - delayed_on_off: 50ms
    on_press:
      then:
        - switch.toggle: relay_b
    internal: true

script:

  - id: toggle_light
    then:
      - switch.toggle: relay_a

  # restart mode cancels a pending auto-off when the fan is toggled again,
  # so a stale timer from an earlier run can't kill a fresh 60-minute window.
  - id: toggle_fan
    mode: restart
    then:
      - switch.toggle: relay_b
      - if:
          condition:
            switch.is_on: relay_b
          then:
            - delay: 60min
            - switch.turn_off: relay_b
