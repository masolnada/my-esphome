substitutions:
  device_name: "persiana-bany"
  device_id: "persiana_bany"
  friendly_name: "Persiana Bany"
  topic_prefix: "persiana_bany"
  static_ip: "10.0.20.56"

# Local fork of current_based: endpoint commands always drive the motor so a
# stale position estimate can't strand the cover (see components/current_based)
external_components:
  - source:
      type: local
      path: ../components
    components: [current_based]

packages:
  # Travel-time auto-calibration for the blind cover
  autocal: !include
    file: ../packages/shutter-autocal/shutter-autocal.yaml
    vars:
      device_name: ${device_name}
  # Hardware configuration
  hardware: !include
    file: ../hardware/shelly-25.yaml
    vars:
      device_name: ${device_name}
      friendly_name: ${friendly_name}

  # Common functionality
  wifi: !include
    file: ../common/wifi.yaml
    vars:
      device_name: ${device_name}
      static_ip: ${static_ip}

  mqtt: !include
    file: ../common/mqtt.yaml
    vars:
      device_name: ${device_name}

  logger: !include ../common/logger.yaml
  web-server: !include ../common/web-server.yaml
  reset: !include ../common/reset.yaml

# Device-specific sensor logic
sensor:
  # Temperature safety monitoring
  - platform: template
    name: "Blind Temperature Monitor"
    lambda: |-
      // Reference the NTC temperature sensor from hardware package
      if (id(ntc_temperature).has_state()) {
        return id(ntc_temperature).state;
      }
      return NAN;
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 30s
    on_value_range:
      above: 90
      then: # Security shutdown by overheating
        - switch.turn_on: _shutdown

globals:
  - id: sw1_state
    type: int
    restore_value: no
    initial_value: '0'  # 0: open next, 1: stop next, 2: close next, 3: stop next

# Device-specific input logic (single momentary button, SW1 only:
# cycles open -> stop -> close -> stop on each press)
binary_sensor:
  - platform: template
    name: "SW1"
    id: sw1
    lambda: |-
      return id(input_a).state;
    filters:
      - delayed_on_off: 10ms
    on_press:
      then:
        - lambda: |-
            auto call = id(blind).make_call();
            switch (id(sw1_state)) {
              case 0: call.set_command_open(); break;
              case 2: call.set_command_close(); break;
              default:
                call.set_command_stop();
                // A manual stop must not be mistaken for a completed travel
                id(autocal_manual_stop) = true;
                break;
            }
            call.perform();
            id(sw1_state) = (id(sw1_state) + 1) % 4;

# Blind control logic - device-specific behavior
cover:
  - platform: current_based
    name: "Blind"
    id: blind

    # Use current sensors from hardware package
    # NOTE: relays and current sensors are swapped on this device —
    # relay_a/channel_a physically drives the close (down) direction,
    # relay_b/channel_b physically drives the open (up) direction.
    open_sensor: close_current
    # Motor draws ~1A while moving (big shutter); threshold must sit below that
    open_moving_current_threshold: 0.5
    # First-boot default only: the autocal package learns the real
    # travel time at runtime. Bias long, never short.
    open_duration: 16s
    open_action:
      - switch.turn_on: relay_b

    close_sensor: open_current
    close_moving_current_threshold: 0.5
    # First-boot default only: the autocal package learns the real
    # travel time at runtime. Bias long, never short.
    close_duration: 16s
    close_action:
      - switch.turn_on: relay_a

    stop_action:
      - switch.turn_off: relay_a  # Hardware package relay ID
      - switch.turn_off: relay_b  # Hardware package relay ID

    # Device-specific behavior parameters
    obstacle_rollback: 30%
    start_sensing_delay: 0.8s
    # Disabled: the ADE7953 only publishes every 0.5s, so right after a
    # mid-motion reversal the opposite channel still reports the pre-reversal
    # current and the component false-detects a welded relay and stops.
    malfunction_detection: false
