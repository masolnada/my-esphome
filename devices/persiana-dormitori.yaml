substitutions:
  device_name: "persiana-dormitori"
  device_id: "persiana_dormitori"
  friendly_name: "Persiana Dormitori"
  topic_prefix: "persiana_dormitori"
  static_ip: "10.0.20.55"

# Local fork of current_based: endpoint commands always drive the motor so a
# stale position estimate can't strand the cover (see components/current_based)
external_components:
  - source:
      type: local
      path: ../components
    components: [current_based]

packages:
  # Travel-time auto-calibration for the blind cover
  autocal: !include
    file: ../packages/shutter-autocal/shutter-autocal.yaml
    vars:
      device_name: ${device_name}
  # Hardware configuration
  hardware: !include
    file: ../hardware/shelly-25.yaml
    vars:
      device_name: ${device_name}
      friendly_name: ${friendly_name}

  # Common functionality
  wifi: !include
    file: ../common/wifi.yaml
    vars:
      device_name: ${device_name}
      static_ip: ${static_ip}

  mqtt: !include
    file: ../common/mqtt.yaml
    vars:
      device_name: ${device_name}

  logger: !include ../common/logger.yaml
  web-server: !include ../common/web-server.yaml
  reset: !include ../common/reset.yaml

# Device-specific WiFi configuration
wifi:
  # ssid: !secret wifi_ssid

  power_save_mode: HIGH # for ESP8266 LOW/HIGH are mixed up, https://github.com/esphome/issues/issues/1532i

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  # ap:
  #   ssid: ${device_name}
  #   password: !secret ap_password
