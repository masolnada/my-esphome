# Device-specific sensor logic
sensor:
  # Temperature safety monitoring
  - platform: template
    name: "Blind Temperature Monitor"
    lambda: |-
      // Reference the NTC temperature sensor from hardware package
      if (id(ntc_temperature).has_state()) {
        return id(ntc_temperature).state;
      }
      return NAN;
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 30s
    on_value_range:
      above: 90
      then: # Security shutdown by overheating
        - switch.turn_on: _shutdown

# Device-specific input logic (maintained contact switch handling)
binary_sensor:
  - platform: template
    name: "Open Switch"
    id: open_switch
    lambda: |-
      return id(input_a).state;
    filters:
      - delayed_on_off: 10ms
    on_state:
      - if:
          condition:
            binary_sensor.is_on: open_switch
          then:
            - cover.open: blind
          else:
            # A direct up->down flip releases this contact as the other one
            # closes; only a true stop (both contacts open) halts the cover
            - if:
                condition:
                  binary_sensor.is_off: close_switch
                then:
                  # A manual stop must not be mistaken for a completed travel
                  - lambda: "id(autocal_manual_stop) = true;"
                  - cover.stop: blind

  - platform: template
    name: "Close Switch"
    id: close_switch
    lambda: |-
      return id(input_b).state;
    filters:
      - delayed_on_off: 10ms
    on_state:
      - if:
          condition:
            binary_sensor.is_on: close_switch
          then:
            - cover.close: blind
          else:
            # A direct down->up flip releases this contact as the other one
            # closes; only a true stop (both contacts open) halts the cover
            - if:
                condition:
                  binary_sensor.is_off: open_switch
                then:
                  # A manual stop must not be mistaken for a completed travel
                  - lambda: "id(autocal_manual_stop) = true;"
                  - cover.stop: blind

# Blind control logic - device-specific behavior
cover:
  - platform: current_based
    name: "Blind"
    id: blind

    # Use current sensors from hardware package
    open_sensor: open_current
    open_moving_current_threshold: 0.5
    # First-boot default only: the autocal package learns the real
    # travel time at runtime. Bias long, never short.
    open_duration: 16s
    open_action:
      - switch.turn_on: relay_a  # Hardware package relay ID

    close_sensor: close_current
    close_moving_current_threshold: 0.5
    # First-boot default only: the autocal package learns the real
    # travel time at runtime. Bias long, never short.
    close_duration: 16s
    close_action:
      - switch.turn_on: relay_b  # Hardware package relay ID

    stop_action:
      - switch.turn_off: relay_a  # Hardware package relay ID
      - switch.turn_off: relay_b  # Hardware package relay ID

    # Device-specific behavior parameters
    obstacle_rollback: 30%
    start_sensing_delay: 0.8s
    # Disabled: the ADE7953 only publishes every 0.5s, so right after a
    # mid-motion reversal the opposite channel still reports the pre-reversal
    # current and the component false-detects a welded relay and stops.
    malfunction_detection: false
